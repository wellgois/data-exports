name: Daily Activities Export

# Exporta as atividades do dia anterior da API JogandoLogica como CSV
# e faz commit do arquivo neste repositório.
#
# Secrets necessários (Settings → Secrets and variables → Actions):
#   API_CLIENT_ID      = client_id da plataforma (ex: plat_xxxx)
#   API_CLIENT_SECRET  = client_secret da plataforma
# Variável (pode ser secret ou repository variable):
#   API_BASE_URL       = https://jogandologica.site/v1   (default abaixo se ausente)

on:
  schedule:
    - cron: "0 6 * * *"        # 06:00 UTC ≈ 03:00 BRT, diário
  workflow_dispatch:           # execução manual / backfill
    inputs:
      from_date:
        description: "Data inicial (YYYY-MM-DD). Vazio = ontem."
        required: false
        default: ""
      to_date:
        description: "Data final (YYYY-MM-DD). Vazio = ontem."
        required: false
        default: ""

permissions:
  contents: write              # necessário para o push do CSV

concurrency:
  group: activities-export
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolver intervalo de datas
        id: dates
        run: |
          set -euo pipefail
          FROM="${{ github.event.inputs.from_date }}"
          TO="${{ github.event.inputs.to_date }}"
          if [ -z "${FROM}" ]; then FROM="$(date -u -d 'yesterday' +%Y-%m-%d)"; fi
          if [ -z "${TO}" ];   then TO="$(date -u -d 'yesterday' +%Y-%m-%d)"; fi
          echo "from=${FROM}" >> "$GITHUB_OUTPUT"
          echo "to=${TO}"     >> "$GITHUB_OUTPUT"
          echo "Intervalo: ${FROM} → ${TO}"

      - name: Obter token OAuth2 (client_credentials)
        id: token
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_CLIENT_ID: ${{ secrets.API_CLIENT_ID }}
          API_CLIENT_SECRET: ${{ secrets.API_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          BASE="${API_BASE_URL:-https://jogandologica.site/v1}"
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"

          if [ -z "${API_CLIENT_ID:-}" ] || [ -z "${API_CLIENT_SECRET:-}" ]; then
            echo "::error::Secrets API_CLIENT_ID / API_CLIENT_SECRET não configurados."
            exit 1
          fi

          # POST /v1/auth/token com credenciais na query string (validado na Fase 2)
          HTTP=$(curl -s -G -X POST "${BASE}/auth/token" \
            -w "%{http_code}" -o token_resp.json \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=${API_CLIENT_ID}" \
            --data-urlencode "client_secret=${API_CLIENT_SECRET}")

          if [ "${HTTP}" != "200" ]; then
            echo "::error::Falha ao obter token (HTTP ${HTTP})."
            cat token_resp.json || true
            exit 1
          fi

          TOKEN=$(jq -er '.access_token' token_resp.json)
          rm -f token_resp.json
          echo "::add-mask::${TOKEN}"
          echo "value=${TOKEN}" >> "$GITHUB_OUTPUT"
          echo "Token obtido com sucesso."

      - name: Baixar export de atividades
        id: fetch
        env:
          TOKEN: ${{ steps.token.outputs.value }}
          BASE:  ${{ steps.token.outputs.base }}
          FROM:  ${{ steps.dates.outputs.from }}
          TO:    ${{ steps.dates.outputs.to }}
        run: |
          set -euo pipefail

          # >>> AJUSTE AQUI se os nomes dos parâmetros do endpoint forem outros <<<
          # Confirme com:
          #   curl -s https://jogandologica.site/v1/openapi.json \
          #     | jq '.paths["/v1/activities/export"].get.parameters'
          OUTDIR="exports/$(date -u -d "${FROM}" +%Y)"
          mkdir -p "${OUTDIR}"
          OUTFILE="${OUTDIR}/activities_${FROM}.csv"
          if [ "${FROM}" != "${TO}" ]; then
            OUTFILE="${OUTDIR}/activities_${FROM}_to_${TO}.csv"
          fi

          HTTP=$(curl -s -G "${BASE}/activities/export" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: text/csv" \
            -w "%{http_code}" -o "${OUTFILE}" \
            --data-urlencode "from_date=${FROM}" \
            --data-urlencode "to_date=${TO}")

          if [ "${HTTP}" != "200" ]; then
            echo "::error::Export falhou (HTTP ${HTTP}). Resposta:"
            head -c 500 "${OUTFILE}" || true
            rm -f "${OUTFILE}"
            exit 1
          fi

          # Sanidade: arquivo não-vazio e não é um JSON de erro
          if [ ! -s "${OUTFILE}" ]; then
            echo "::error::Export retornou arquivo vazio."
            rm -f "${OUTFILE}"
            exit 1
          fi
          if head -c 1 "${OUTFILE}" | grep -q '{'; then
            echo "::warning::Resposta parece JSON, não CSV. Verifique o Accept/params do endpoint."
            head -c 500 "${OUTFILE}"
          fi

          LINES=$(wc -l < "${OUTFILE}")
          echo "Salvo ${OUTFILE} (${LINES} linhas)."
          echo "file=${OUTFILE}" >> "$GITHUB_OUTPUT"

      - name: Commit e push do CSV
        env:
          OUTFILE: ${{ steps.fetch.outputs.file }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${OUTFILE}"
          if git diff --cached --quiet; then
            echo "Nenhuma mudança — arquivo idêntico ao já versionado."
            exit 0
          fi
          git commit -m "data: export de atividades (${{ steps.dates.outputs.from }} → ${{ steps.dates.outputs.to }})"
          git push
