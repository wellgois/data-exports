name: Daily Activities Export

# Exporta as atividades do dia anterior da API JogandoLogica (JSON paginado)
# converte para CSV e faz commit neste repositório.
#
# Secrets necessários (Settings → Secrets and variables → Actions):
#   API_CLIENT_ID      = client_id da plataforma (ex: plat_xxxx)
#   API_CLIENT_SECRET  = client_secret da plataforma
#   API_BASE_URL       = https://jogandologica.site/v1   (default abaixo se ausente)

on:
  schedule:
    - cron: "0 6 * * *"        # 06:00 UTC ≈ 03:00 BRT, diário
  workflow_dispatch:
    inputs:
      from_date:
        description: "Data inicial (YYYY-MM-DD). Vazio = ontem."
        required: false
        default: ""
      to_date:
        description: "Data final (YYYY-MM-DD). Vazio = ontem."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: activities-export
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolver intervalo de datas
        id: dates
        run: |
          set -euo pipefail
          FROM="${{ github.event.inputs.from_date }}"
          TO="${{ github.event.inputs.to_date }}"
          [ -z "${FROM}" ] && FROM="$(date -u -d 'yesterday' +%Y-%m-%d)" || true
          [ -z "${TO}" ]   && TO="$(date -u -d 'yesterday' +%Y-%m-%d)"   || true
          echo "from=${FROM}" >> "$GITHUB_OUTPUT"
          echo "to=${TO}"     >> "$GITHUB_OUTPUT"
          echo "Intervalo: ${FROM} → ${TO}"

      - name: Obter token OAuth2 (client_credentials)
        id: token
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_CLIENT_ID: ${{ secrets.API_CLIENT_ID }}
          API_CLIENT_SECRET: ${{ secrets.API_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          BASE="${API_BASE_URL:-https://jogandologica.site/v1}"
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          if [ -z "${API_CLIENT_ID:-}" ] || [ -z "${API_CLIENT_SECRET:-}" ]; then
            echo "::error::Secrets API_CLIENT_ID / API_CLIENT_SECRET não configurados."; exit 1
          fi
          HTTP=$(curl -s -G -X POST "${BASE}/auth/token" \
            -w "%{http_code}" -o token_resp.json \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=${API_CLIENT_ID}" \
            --data-urlencode "client_secret=${API_CLIENT_SECRET}")
          if [ "${HTTP}" != "200" ]; then
            echo "::error::Falha ao obter token (HTTP ${HTTP})."; cat token_resp.json || true; exit 1
          fi
          TOKEN=$(jq -er '.access_token' token_resp.json)
          rm -f token_resp.json
          echo "::add-mask::${TOKEN}"
          echo "value=${TOKEN}" >> "$GITHUB_OUTPUT"
          echo "Token obtido."

      - name: Baixar export paginado (JSON) e converter para CSV
        id: fetch
        env:
          TOKEN: ${{ steps.token.outputs.value }}
          BASE:  ${{ steps.token.outputs.base }}
          FROM:  ${{ steps.dates.outputs.from }}
          TO:    ${{ steps.dates.outputs.to }}
        run: |
          set -euo pipefail
          : > all.ndjson
          # A API trata to_date como EXCLUSIVO ([from, to)). Para incluir o dia TO,
          # passamos to_date = TO + 1 dia. FROM/TO seguem nomeando o CSV pela data real.
          TO_EXCL=$(date -u -d "${TO} +1 day" +%Y-%m-%d)
          echo "Consultando API com from_date=${FROM} to_date=${TO_EXCL} (exclusivo)"
          CURSOR=""
          PREV_CURSOR="__none__"
          PAGE=0
          while : ; do
            PAGE=$((PAGE+1))
            ARGS=(--data-urlencode "from_date=${FROM}" \
                  --data-urlencode "to_date=${TO_EXCL}" \
                  --data-urlencode "limit=5000")
            [ -n "${CURSOR}" ] && ARGS+=(--data-urlencode "cursor=${CURSOR}") || true
            HTTP=$(curl -s -G "${BASE}/activities/export" \
              -H "Authorization: Bearer ${TOKEN}" -H "Accept: application/json" \
              -w "%{http_code}" -o page.json "${ARGS[@]}")
            if [ "${HTTP}" != "200" ]; then
              echo "::error::Export falhou na página ${PAGE} (HTTP ${HTTP})."
              head -c 500 page.json || true; exit 1
            fi
            jq -c '.data[]?' page.json >> all.ndjson
            HASMORE=$(jq -r '.has_more // false' page.json)
            CURSOR=$(jq -r '.next_cursor // empty' page.json)
            echo "  página ${PAGE}: +$(jq '.count // 0' page.json) registros (has_more=${HASMORE})"
            # condições de parada / proteção contra loop infinito
            [ "${HASMORE}" = "true" ] || break
            [ -n "${CURSOR}" ] || break
            [ "${CURSOR}" != "${PREV_CURSOR}" ] || { echo "::warning::cursor repetido; parando."; break; }
            [ "${PAGE}" -lt 1000 ] || { echo "::warning::limite de 1000 páginas atingido."; break; }
            PREV_CURSOR="${CURSOR}"
          done
          rm -f page.json

          RECORDS=$(wc -l < all.ndjson | tr -d ' ')
          echo "Total de registros: ${RECORDS}"
          echo "records=${RECORDS}" >> "$GITHUB_OUTPUT"
          if [ "${RECORDS}" -eq 0 ]; then
            echo "Sem atividades no período — nada a gravar."
            exit 0
          fi

          OUTDIR="exports/$(date -u -d "${FROM}" +%Y)"
          mkdir -p "${OUTDIR}"
          OUTFILE="${OUTDIR}/activities_${FROM}.csv"
          [ "${FROM}" != "${TO}" ] && OUTFILE="${OUTDIR}/activities_${FROM}_to_${TO}.csv" || true

          # JSON→CSV genérico: colunas = união das chaves; valores não-escalares viram JSON.
          jq -rs '
            (map(keys) | add | unique) as $cols
            | ($cols | @csv),
              ( .[] | [ $cols[] as $c
                        | (.[$c] | if type=="object" or type=="array" then tojson else . end) ]
                    | @csv )
          ' all.ndjson > "${OUTFILE}"
          echo "Salvo ${OUTFILE} ($(wc -l < "${OUTFILE}") linhas incl. cabeçalho)."
          echo "file=${OUTFILE}" >> "$GITHUB_OUTPUT"

      - name: Commit e push do CSV
        if: steps.fetch.outputs.records != '0'
        env:
          OUTFILE: ${{ steps.fetch.outputs.file }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${OUTFILE}"
          if git diff --cached --quiet; then
            echo "Nenhuma mudança — arquivo idêntico ao versionado."; exit 0
          fi
          git commit -m "data: export de atividades (${{ steps.dates.outputs.from }} → ${{ steps.dates.outputs.to }})"
          git push
